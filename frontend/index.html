<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="TwinMind — AI meeting copilot that surfaces live suggestions, transcribes audio, and answers questions in real time." />
    <title>TwinMind — Live Meeting Copilot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>

    <!-- ── Settings Modal ──────────────────────────────────────── -->
    <div id="settings-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-label="Settings">
      <div class="modal">
        <div class="modal-header">
          <h2>Settings</h2>
          <button id="btn-close-settings" class="btn-icon-sm" aria-label="Close settings">✕</button>
        </div>

        <div class="modal-body">
          <label class="field-label" for="setting-api-key">Groq API Key <span class="required">*</span></label>
          <input id="setting-api-key" type="password" class="field-input" placeholder="gsk_…" autocomplete="off" />
          <p class="field-hint">Get your key at <a href="https://console.groq.com" target="_blank">console.groq.com</a></p>

          <label class="field-label" for="setting-model">Model</label>
          <input id="setting-model" type="text" class="field-input" value="meta-llama/llama-4-maverick-17b-128e-instruct" />

          <div class="field-row">
            <div>
              <label class="field-label" for="setting-context-words">Suggestion Context (words)</label>
              <input id="setting-context-words" type="number" class="field-input" value="600" min="100" max="3000" />
            </div>
            <div>
              <label class="field-label" for="setting-refresh-interval">Auto-refresh (seconds)</label>
              <input id="setting-refresh-interval" type="number" class="field-input" value="30" min="10" max="120" />
            </div>
          </div>

          <label class="field-label" for="setting-suggestion-prompt">Suggestion Prompt</label>
          <textarea id="setting-suggestion-prompt" class="field-textarea" rows="8"></textarea>

          <label class="field-label" for="setting-chat-prompt">Chat System Prompt</label>
          <textarea id="setting-chat-prompt" class="field-textarea" rows="6"></textarea>
        </div>

        <div class="modal-footer">
          <button id="btn-reset-settings" class="btn-secondary">Reset Defaults</button>
          <button id="btn-save-settings" class="btn-primary">Save Settings</button>
        </div>
      </div>
    </div>

    <!-- ── App ────────────────────────────────────────────────── -->
    <div id="app">

      <!-- Header -->
      <header class="app-header">
        <div class="header-brand">
          <div class="brand-icon" aria-hidden="true">🧠</div>
          <span class="brand-name">TwinMind</span>
          <span class="brand-tag">Live Copilot</span>
        </div>

        <div class="header-controls">
          <!-- Recording indicator -->
          <div id="rec-indicator" class="rec-indicator hidden" aria-hidden="true">
            <span class="rec-dot"></span>
            <span>REC</span>
          </div>
          <span id="recording-timer" class="recording-timer hidden" aria-live="polite">00:00</span>

          <!-- Mic button -->
          <button id="btn-mic" class="btn-mic" aria-label="Start recording">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M12 1a4 4 0 0 0-4 4v7a4 4 0 0 0 8 0V5a4 4 0 0 0-4-4Z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2H3v2a9 9 0 0 0 8 8.94V23h2v-2.06A9 9 0 0 0 21 12v-2h-2Z"/>
            </svg>
            <span class="btn-mic-label">Start</span>
          </button>

          <button id="btn-refresh" class="btn-header" title="Refresh suggestions">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
              <path d="M21 3v5h-5"/>
              <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
              <path d="M8 16H3v5"/>
            </svg>
            Refresh
          </button>

          <button id="btn-export" class="btn-header" title="Export session as JSON">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Export
          </button>

          <button id="btn-settings" class="btn-header" title="Settings" aria-label="Open settings">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/>
            </svg>
            Settings
          </button>
        </div>
      </header>

      <!-- Main grid -->
      <main class="main-grid" role="main">

        <!-- Column 1: Transcript -->
        <section class="col" id="col-transcript" aria-label="Transcript">
          <div class="col-header">
            <h1 class="col-title">Transcript</h1>
            <span id="transcript-status" class="status-badge" aria-live="polite">Ready</span>
          </div>
          <div id="transcript-list" class="scroll-area" role="log" aria-live="polite">
            <p class="empty-state">Click <strong>Start</strong> to begin recording…</p>
          </div>
        </section>

        <!-- Column 2: Live Suggestions -->
        <section class="col" id="col-suggestions" aria-label="Live Suggestions">
          <div class="col-header">
            <h2 class="col-title">Live Suggestions</h2>
            <span id="suggestions-status" class="status-badge" aria-live="polite">Ready</span>
          </div>
          <div id="suggestions-list" class="scroll-area" role="list">
            <p class="empty-state">Suggestions appear every ~30 s while recording…</p>
          </div>
        </section>

        <!-- Column 3: Chat -->
        <section class="col col-chat" id="col-chat" aria-label="Chat">
          <div class="col-header">
            <h2 class="col-title">Chat</h2>
          </div>
          <div id="chat-messages" class="scroll-area chat-messages" role="log" aria-live="polite">
            <p class="empty-state">Click a suggestion or type a question…</p>
          </div>
          <div class="chat-input-bar">
            <textarea
              id="chat-input"
              class="chat-input"
              placeholder="Ask anything about your meeting…"
              rows="2"
              aria-label="Chat input"
            ></textarea>
            <button id="btn-send-chat" class="btn-send" aria-label="Send message">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M2 21L23 12 2 3v7l15 2-15 2v7Z"/>
              </svg>
            </button>
          </div>
        </section>

      </main>
    </div>

    <!-- Toast container -->
    <div id="toast-container" class="toast-container" aria-live="assertive" aria-atomic="true"></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
